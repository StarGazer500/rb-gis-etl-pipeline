user  nginx;
worker_processes  auto;
pid   /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile on;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json
    application/xml image/svg+xml;

  keepalive_timeout   300s;
  client_body_timeout 300s;
  client_header_timeout 300s;
  send_timeout        300s;

  server {
    listen 80;
    server_name geoserver2.rainforestbuilder.com;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Static assets: versioned by Vite hashes, cache for 1 year ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # ── API: proxy to FastAPI backend ─────────────────────────────────────────
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $server_name;

      proxy_read_timeout    300s;
      proxy_connect_timeout 300s;
      proxy_send_timeout    300s;

      proxy_pass http://backend:8080;
    }

    # ── TiTiler: proxy to TiTiler service ────────────────────────────────────
    location ^~ /titiler/ {
      proxy_pass http://titiler:8000/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback: let TanStack Router handle all other routes ─────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
