services:


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data        # persists the job queue across restarts
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app-network


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend-main:latest
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # celery:
  #   image: backend-main:latest
  #   command: celery -A src.core.celery.celery_app worker --loglevel=info --concurrency=4
  #   env_file:
  #     - .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     backend:
  #       condition: service_started
  #   restart: unless-stopped
  #   networks:
  #     - app-network

  # celery-beat:
  #   image: backend-main:latest
  #   command: celery -A src.core.celery.celery_app beat --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     backend:
  #       condition: service_started
  #   restart: unless-stopped
  #   networks:
  #     - app-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ""
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    networks:
      - app-network


  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "81:81"      # Admin interface
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - nginx
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  npm_data:
  npm_letsencrypt:      






