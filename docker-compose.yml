  titiler:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TITILER_API_CORS_ORIGINS=http://localhost:3001
      # - TITILER_API_ROOT_PATH=/titiler
      - AWS_DEFAULT_REGION=eu-north-1
      # GDAL/S3 performance tuning for large COGs
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - GDAL_CACHEMAX=512
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=10000000
      - CPL_VSIL_CURL_CACHE_SIZE=200000000
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_HTTP_VERSION=2
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    networks:
      - app-network


  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ""
    expose:
      - "80"
    # depends_on:
    #   - backend
    restart: always
    networks:
      - app-network


  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "81:81"      # Admin interface
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - nginx
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  # redis_data:
  npm_data:
  npm_letsencrypt:      






